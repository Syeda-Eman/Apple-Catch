<body>

<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById|("gameCanvas");
const ctx = canvas.getContext("2d");
let score=0;
let live = 3;
let gameOver = false;
let gameInterval;
let timerInterval;
const basketImg = new Image();
basketImg.src = "apple-Photoroom.png";
const goodAppleImg = new Image();
goodAppleImg.src="good apple-Photoroom.png";
const badAppleImg = new Image();
badAppleImg.src = "bad apple-Photoroom.png";
const appleSize = 110;
const basket = {
    x: 0,
    y: 0,
    width: 200,
    height: 110
};

const apples = [];
let spawnTimer = 0;
let spawnRate = 40;
function resizeCanvas() {
    canvas.width= window.innerWidth;
    canvas.height = window.innerHeight;
    basket.y = canvas.height -150;
    if (basket.x > canvas.width - basket.width){
        basket.x = canvas.width - basket.width;
    }
}
window.addEventListener('resize', resizeCanvas);
recizeCanvas();
window.addEventListener("mousemove", (e)=> {
    basket.x = e.clientX - basket.width/2;
    if (basket.x < 0) basket.x = 0;
    if (basket.x > canvas.width - basket.width) basket.x = canvas.width - basket.width;
});
window.addEventListener("click",()=>{
    if(gameOver){
        resetGame();
    }
});
function spawnApple(){
    const isGood = Math.random()>0.4;
    apples.push({
        x: Math.random()*(canvas.width-appleSize),
        y: -appleSize,
        type: isGood ? 'good':'bad',
        speed: 4+Math.random()*4
    });
}
function update(){
    if (gameOver) return;
    spawnTimer++;
    if(spawnTimer >= spawnRate){
        spawnApple();
        spawnTimer=0;
    }
    for (let i= apples.length-1; i>=0; i--){
        let a = apples[i];
        a.y += a.speed;
        if (a.y + appleSize >= basket.y &&
            a.y <= basket.y + baket.height &&
            a.x + appleSize >= basket.x &&
            a.x <= baket.x + basket.width){
            if (a.type === 'good'){
                score++;
            } else {
                lives--;
            }
            apples.splice(i, 1);
            checkGameOver();
            continue;
        }
        if (a.y > canvas.height){
            if (a.type === 'good'){
                lives--;
            }
            apples.splice(i, 1);
            checkGameOver();
        }
    }
}
